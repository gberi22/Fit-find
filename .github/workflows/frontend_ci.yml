name: Frontend CI
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: find-your-fit/package-lock.json

      - name: Install dependencies
        working-directory: find-your-fit
        run: npm ci

      - name: Check formatting
        working-directory: find-your-fit
        run: npx prettier --check .

      - name: Build
        working-directory: find-your-fit
        run: npm run build
