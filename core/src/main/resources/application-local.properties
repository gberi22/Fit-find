spring.application.name=FitFind
spring.main.allow-bean-definition-overriding=true

spring.datasource.url=jdbc:postgresql://localhost:5433/fitfind
spring.datasource.username=fitfind
spring.datasource.password=secret
# CORS configuration for local front-end development
# - allowed-origins: Whitelisted origins (e.g., Angular server on :4200)
# - allowed-methods: HTTP methods allowed
app.cors.allowed-origins[0]=http://localhost:4200
app.cors.allowed-methods[0]=GET
app.cors.allowed-methods[1]=POST
app.cors.allowed-methods[2]=PUT
app.cors.allowed-methods[3]=DELETE
app.cors.allowed-methods[4]=OPTIONS
app.cors.allowed-methods[5]=PATCH
app.cors.allowed-headers[0]=*
# rate limit configuration for auth API calls:
# email/password login: 5 attempts per 10 minutes
app.rate-limit.types.CLIENT_LOGIN.cooldown=1m
app.rate-limit.types.CLIENT_LOGIN.capacity=5
# AI generation (outfit suggestions, incl. reference-picture/text input): 10 per user per hour
app.rate-limit.types.AI_GENERATION.cooldown=1m
app.rate-limit.types.AI_GENERATION.capacity=10
# Outfit image generation: 10 per user per hour (separate bucket from suggestions)
app.rate-limit.types.IMAGE_GENERATION.cooldown=1m
app.rate-limit.types.IMAGE_GENERATION.capacity=10

# AI config
# insert your Github personal access token with models:read permission here
# 1st step in terminal: export GITHUB_MODELS_TOKEN=your_token_here
# 2nd step: insert GITHUB_MODELS_TOKEN in Run Configuration > Environment Variables
ai.github-models.key=${GITHUB_MODELS_TOKEN}
ai.github-models.model=gpt-4.1
ai.github-models.endpoint=https://models.inference.ai.azure.com
ai.github-models.vision-model=gpt-4.1

# Spring AI (multimodal/vision) - OpenAI-compatible client pointed at the GitHub Models endpoint
spring.ai.openai.api-key=${GITHUB_MODELS_TOKEN}
spring.ai.openai.base-url=https://models.inference.ai.azure.com
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=gpt-4.1
spring.ai.openai.embedding.enabled=false

# Vision (reference-picture) upload limits
ai.vision.max-images=5
ai.vision.max-image-size=10MB

# Web Search API
web-search-api.key=${SERPAPI_KEY:}
web-search-api.base-url=https://serpapi.com
web-search-api.connect-timeout=5s
web-search-api.read-timeout=10s
web-search-api.max-attempts=3
web-search-api.retry-backoff=500ms

# Image Generation AI (Google Gemini 2.5 Flash Image)
gemini-api.key=${GEMINI_API_KEY:}
gemini-api.base-url=https://generativelanguage.googleapis.com
gemini-api.model=gemini-2.5-flash-image
